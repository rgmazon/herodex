name: Heartbeat

on:
  schedule:
    - cron: '0 9 * * 1,3,5'  # Mon, Wed, Fri at 9am UTC
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://herodex-api.onrender.com/up)
          echo "Status: $response"
          if [ "$response" != "200" ]; then
            echo "Backend returned $response — expected 200"
            exit 1
          fi

      - name: Ping API health (touches Supabase)
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Accept: application/json" \
            https://herodex-api.onrender.com/api/heroes/featured)
          echo "Status: $response"
          if [ "$response" != "200" ]; then
            echo "API returned $response — expected 200"
            exit 1
          fi

      - name: Done
        run: echo "HeroDex is alive ✅"
